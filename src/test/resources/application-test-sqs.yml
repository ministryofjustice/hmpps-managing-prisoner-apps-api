# SQS-specific test profile
# This profile enables SQS for tests that need it (e.g., PrisonerMergeIntegrationTest)
# Use with: @ActiveProfiles("test", "test-sqs")

spring:
  autoconfigure:
    exclude: []  # Override the exclusion from application-test.yml to enable SQS

hmpps:
  sqs:
    enabled: true  # Override the disabled default from application-test.yml

