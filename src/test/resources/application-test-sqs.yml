# SQS-specific test configuration
# Only used by tests that need SQS/LocalStack (PrisonerMergeIntegrationTest)

spring:
  autoconfigure:
    exclude: []  # Override the exclusion from application-test.yml

hmpps:
  sqs:
    enabled: true
    provider: localstack
    localstackUrl: http://localhost:4566
    region: eu-west-2
    queues:
      domaineventsqueue:
        queueName: domainevents-queue
        dlqName: domainevents-queue-dlq
        subscribeTopicId: domainevents
    topics:
      domainevents:
        arn: arn:aws:sns:eu-west-2:000000000000:domainevents-topic

