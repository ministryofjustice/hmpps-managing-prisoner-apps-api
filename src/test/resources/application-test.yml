server:
  shutdown: immediate

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

hmpps:
  auth:
    base-url: "http://localhost:8090/auth"
  manage-users:
    api:
      url: http://localhost:8094
      timeout: 10s
  prisoner-search:
    api:
      url: http://localhost:8093
      timeout: 10s
  document:
    api:
      url: https://document-api-dev.hmpps.service.justice.gov.uk
      timeout: 10s
  sar:
    template:
      enabled: true
      path: /sar/templates/sar_template.mustache
    tests:
      # When generate-actual is true the SAR tests write the actual output to
      # src/test/resources/*.log scratch files AND the @AfterEach tearDown in
      # SarIntegrationTestBase automatically promotes them into:
      #   src/test/resources/sar/expected/jpa-entity-schema.json
      #   src/test/resources/sar/expected/sar-api-response.json
      #   src/test/resources/sar/expected/sar-report-output.html
      #
      # To regenerate expected snapshots:
      #   1. Set generate-actual: true
      #   2. Set generate-actual: true
      generate-actual: false
      expected-api-response-path: /sar/expected/sar-api-response.json
      expected-jpa-entity-schema-path: /sar/expected/jpa-entity-schema.json
      expected-render-result-path: /sar/expected/sar-report-output.html
      attachments-expected: true

# example client configuration for calling out to other services
# TODO: Remove / replace this configuration
example-api:
  url: "http://localhost:8091"
  client:
    id: "example-api-client"
    secret: "example-api-client-secret"

spring:
  application:
    name: hmpps-managing-prisoner-apps-api
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  datasource:
    username: sa
    password: password
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${hmpps.auth.base-url}/.well-known/jwks.json

      # TODO: This client section can be removed if your service doesn't call out to other services
      client:
        provider:
          hmpps-auth:
            token-uri: ${hmpps.auth.base-url}/token

        registration:
          other-hmpps-apis:
            provider: hmpps-auth
            client-id: "client-id"
            client-secret: "client-secret"
            authorization-grant-type: client_credentials
            scope: read

          example-api:
            provider: hmpps-auth
            client-id: ${example-api.client.id}
            client-secret: ${example-api.client.secret}
            authorization-grant-type: client_credentials
            scope: read
