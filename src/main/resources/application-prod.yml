# example client configuration for calling out to other services
# TODO: Remove / replace this configuration
example-api:
  url: https://managing-prisoner-apps-api.hmpps.service.justice.gov.uk

hmpps:
  self:
    url: https://managing-prisoner-apps-api.hmpps.service.justice.gov.uk
  sqs:
    queues:
      domaineventsqueue:
        queueName: ${HMPPS_SQS_QUEUES_DOMAINEVENTSQUEUE_QUEUE_NAME}
        dlqName: ${HMPPS_SQS_QUEUES_DOMAINEVENTSQUEUE_DLQ_NAME}
  auth:
    base-url: https://sign-in.hmpps.service.justice.gov.uk/auth
    timeout: 10s
  manage-users:
    api:
      url: https://manage-users-api.hmpps.service.justice.gov.uk
      timeout: 10s
  prisoner-search:
    api:
      url: https://prisoner-search.prison.service.justice.gov.uk
      timeout: 10s
  document:
    api:
      url: https://document-api.hmpps.service.justice.gov.uk
      timeout: 10s
