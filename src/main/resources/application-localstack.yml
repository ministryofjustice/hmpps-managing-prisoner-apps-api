# LocalStack-specific configuration for local development and testing
# This profile is automatically activated when using 'localstack' profile

# Remove the spring.autoconfigure.exclude to enable SQS integration with LocalStack
# Also set hmpps.sqs.enabled to true to enable the SQS configuration for LocalStack
# SPRING_PROFILES_ACTIVE=localstack and start localstack container.
# (docker run --rm -d -p 4566:4566 -e SERVICES=sns,sqs --name localstack localstack/localstack:community-archive)

spring:
  autoconfigure:
    exclude:
      - uk.gov.justice.hmpps.sqs.HmppsSqsConfiguration
  flyway:
    locations: classpath:db/migration/dev

hmpps:
  sqs:
    enabled: false
    provider: localstack
    localstackUrl: http://localhost:4566
    region: eu-west-2
    queues:
      domaineventsqueue:
        queueName: domainevents-queue
        dlqName: domainevents-queue-dlq
        subscribeTopicId: domainevents
    topics:
      domainevents:
        arn: arn:aws:sns:eu-west-2:000000000000:domainevents-topic

  auth:
    base-url: https://sign-in-dev.hmpps.service.justice.gov.uk/auth
    timeout: 10s
  manage-users:
    api:
      url: https://manage-users-api-dev.hmpps.service.justice.gov.uk
      timeout: 10s
  prisoner-search:
    api:
      url: https://prisoner-search-dev.prison.service.justice.gov.uk
      timeout: 10s

example-api:
  url: "http://localhost:8080"
  client:
    id: "example-api-client"
    secret: "example-api-client-secret"

