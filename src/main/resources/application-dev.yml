# example client configuration for calling out to other services
# TODO: Remove / replace this configuration
example-api:
  url: "http://localhost:8080"
  client:
    id: "example-api-client"
    secret: "example-api-client-secret"

spring:
  autoconfigure:
    exclude:
      - uk.gov.justice.hmpps.sqs.HmppsSqsConfiguration  # Exclude SQS for local dev
  flyway:
     locations: classpath:db/migration/dev

hmpps:
  self:
    url: https://managing-prisoner-apps-api-dev.hmpps.service.justice.gov.uk
  auth:
    base-url: https://sign-in-dev.hmpps.service.justice.gov.uk/auth
    timeout: 10s
  manage-users:
    api:
      url: https://manage-users-api-dev.hmpps.service.justice.gov.uk
      timeout: 10s
  prisoner-search:
    api:
      url: https://prisoner-search-dev.prison.service.justice.gov.uk
      timeout: 10s
  document:
    api:
      url: https://document-api-dev.hmpps.service.justice.gov.uk
      timeout: 10s
  sar:
    additionalAccessRole: MANAGING_PRISONER_APPS
  sqs:
    enabled: false  # Disabled for local dev - cloud dev overrides with HMPPS_SQS_ENABLED=true


